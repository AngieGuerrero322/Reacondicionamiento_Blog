<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latido músical</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body  style="background-color: #713aae; color: #ffffff;"  class="bg-purple text-light">
    

    <main class="container d-flex align-items-center justify-content-center" style="min-height: 100vh; padding-top: 80px;">
        
        <section class="col-12 col-md-8 col-lg-6 shadow-lg p-4 rounded bg-secondary bg-opacity-10">
            
            <h1 class="text-center mb-4 border-bottom pb-2">Contáctanos</h1>

            <form class="row g-3"> <div class="col-md-6">
                    <label for="inputEmail4" class="form-label">Correo</label>
                    <input type="email" class="form-control" id="inputEmail4" placeholder="Correo">
                </div>
                <div class="col-md-6">
                    <label for="inputPassword4" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="inputPassword4" placeholder="Contraseña">
                </div>
                
                <div class="col-12">
                    <label for="inputAddress" class="form-label">Direccion</label>
                    <input type="text" class="form-control" id="inputAddress" placeholder="Calle 123">
                </div>
                
                <div class="col-md-6">
                    <label for="inputCity" class="form-label">Ciudad</label>
                    <input type="text" class="form-control" id="inputCity">
                </div>
                <div class="form-group">
                    <label for="exampleFormControlTextarea1">Escribenos tus ideas...</label>
                    <textarea class="form-control" id="exampleFormControlTextarea1" rows="3" placeholder="Comentanos aqui"></textarea>
                </div>
                
                <div class="col-12 text-center">
                    <button type="submit" class="btn btn-primary px-5">Enviar</button>
                </div>
            </form>
            
        </section>
    </main>

    

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
